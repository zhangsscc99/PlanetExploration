<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>克罗斯星探险 - 3D游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: #000;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            background: rgba(0,0,0,0.6);
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 14px;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            text-align: center;
        }

        #gameOverOverlay {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 14px;
            background: rgba(0, 0, 0, 0.45);
            z-index: 30;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        #restartBtn {
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            background: #ff6a4d;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="loading">加载中...</div>
    <div id="ui">
        <div>克罗斯星探险</div>
        <div id="score">收集的晶体: 0</div>
        <div id="playerHp">主角生命: 100 / 100</div>
        <div id="buffStatus">攻速倍率: x1.00</div>
    </div>
    <div id="controls">
        WASD 移动 | 鼠标拖拽旋转视角 | 滚轮缩放 | 空格跳跃 | J 射击
    </div>
    <div id="gameOverOverlay">
        <div>主角已被击败</div>
        <button id="restartBtn">重新开始</button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

        // 游戏状态
        const gameState = {
            score: 0,
            playerPos: new THREE.Vector3(0, 1, 5),
            playerVelocity: new THREE.Vector3(0, 0, 0),
            isJumping: false,
            keys: {},
            isGameOver: false
        };
        const animationState = {
            mixer: null,
            actions: { idle: null, walk: null },
            currentAction: null,
            hasBuiltInAnimations: false,
            visualRoot: null,
            baseVisualY: 0,
            proceduralTime: 0
        };
        const modelTrim = {
            enabled: true,
            bottomClip: 0.08, // 先裁一点点，后续可继续加大
            clipPlane: new THREE.Plane(new THREE.Vector3(0, 1, 0), 0),
            clipTarget: null,
            localClipHeight: 0,
            tmpQuat: new THREE.Quaternion(),
            tmpNormal: new THREE.Vector3(),
            tmpPoint: new THREE.Vector3()
        };
        const worldConfig = {
            tileSize: 30,
            tileCountPerAxis: 2,
            borderPadding: 1.2
        };
        const modelFit = {
            targetHeight: 1.8,
            footGroundOffset: 0.03
        };
        const physics = {
            groundY: 1,
            jumpVelocity: 6.8,
            gravity: 18,
            fallGravity: 26,
            maxFallSpeed: 30,
            apexHangVelocity: 1.4,
            apexGravityScale: 0.45
        };
        const cameraState = {
            yaw: Math.PI,
            pitch: 0.35,
            distance: 9,
            minDistance: 4.5,
            maxDistance: 14,
            rotateSensitivity: 0.004,
            isDragging: false,
            lastX: 0,
            lastY: 0
        };
        const shootingState = {
            bullets: [],
            speed: 20,
            life: 1.8,
            radius: 0.09,
            cooldown: 0.2,
            cooldownLeft: 0
        };
        const enemyConfig = {
            maxHp: 100,
            speed: 5 / 3, // 敌人速度=主角(5)的三分之一
            flashDuration: 0.16
        };
        const levelState = {
            current: 1,
            wave2Spawned: false,
            wave2BuffDropsTotal: 0,
            wave2BuffCollected: 0,
            bossSpawned: false
        };
        const playerState = {
            maxHp: 100,
            hp: 100,
            touchDamage: 5,
            hitCooldown: 1.5,
            cooldownLeft: 0,
            attackSpeedMultiplier: 1
        };
        const buffState = {
            drops: [],
            bobTime: 0
        };

        // 场景设置
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

        // 相机
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);

        // 渲染器
        const canvas = document.getElementById('gameCanvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.localClippingEnabled = true;

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        // 地面与 createGround 使用同一套高度函数，保证角色贴地
        function getGroundHeightAt(x, z) {
            return Math.sin(x * 0.3) * Math.cos(z * 0.3) * 0.3;
        }

        // 光照
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        directionalLight.shadow.camera.left = -20;
        directionalLight.shadow.camera.right = 20;
        directionalLight.shadow.camera.top = 20;
        directionalLight.shadow.camera.bottom = -20;
        scene.add(directionalLight);

        // 创建地面（四块拼接）
        function createGround() {
            const tileSize = worldConfig.tileSize;
            const tileSegments = 50;
            const material = new THREE.MeshStandardMaterial({
                color: 0xF28A66,
                roughness: 0.8,
                metalness: 0.2
            });

            const tileOffsets = [
                [-tileSize / 2, -tileSize / 2],
                [ tileSize / 2, -tileSize / 2],
                [-tileSize / 2,  tileSize / 2],
                [ tileSize / 2,  tileSize / 2]
            ];

            tileOffsets.forEach(([offsetX, offsetZ]) => {
                const geometry = new THREE.PlaneGeometry(tileSize, tileSize, tileSegments, tileSegments);
                const positions = geometry.attributes.position;

                // 使用世界坐标采样噪声，保证四块拼接处连续
                for (let i = 0; i < positions.count; i++) {
                    const localX = positions.getX(i);
                    const localY = positions.getY(i);
                    const worldX = localX + offsetX;
                    const worldZ = localY + offsetZ;
                    const noise = Math.sin(worldX * 0.3) * Math.cos(worldZ * 0.3) * 0.3;
                    positions.setZ(i, noise);
                }
                geometry.computeVertexNormals();

                const groundTile = new THREE.Mesh(geometry, material);
                groundTile.rotation.x = -Math.PI / 2;
                groundTile.position.set(offsetX, 0, offsetZ);
                groundTile.receiveShadow = true;
                scene.add(groundTile);
            });
        }

        // 创建岩石
        function createRock(x, z, scale = 1) {
            const geometry = new THREE.DodecahedronGeometry(0.5 * scale, 0);
            const material = new THREE.MeshStandardMaterial({
                color: 0xB38050,
                roughness: 0.9,
                flatShading: true
            });

            const rock = new THREE.Mesh(geometry, material);
            rock.position.set(x, 0.3 * scale, z);
            rock.castShadow = true;
            rock.receiveShadow = true;
            scene.add(rock);
            return rock;
        }

        // 创建黄色晶体
        function createCrystal(x, z) {
            const geometry = new THREE.OctahedronGeometry(0.4, 0);
            const material = new THREE.MeshStandardMaterial({
                color: 0xFFD94D,
                roughness: 0.3,
                metalness: 0.5,
                emissive: 0xFFD94D,
                emissiveIntensity: 0.3,
                flatShading: true
            });

            const crystal = new THREE.Mesh(geometry, material);
            crystal.position.set(x, 0.5, z);
            crystal.castShadow = true;
            crystal.userData.isCrystal = true;
            scene.add(crystal);
            return crystal;
        }

        function createFallbackPlayer() {
            const geometry = new THREE.CapsuleGeometry(0.3, 0.8, 4, 8);
            const material = new THREE.MeshStandardMaterial({
                color: 0x4A90E2,
                roughness: 0.5
            });

            const fallback = new THREE.Mesh(geometry, material);
            fallback.position.copy(gameState.playerPos);
            fallback.castShadow = true;
            scene.add(fallback);
            animationState.visualRoot = fallback;
            animationState.baseVisualY = 0;
            if (modelTrim.enabled) {
                applyTrimMaterialClipping(fallback);
                calibrateModelTrim(fallback);
            }
            return fallback;
        }

        function setupAnimationActions(clipSource) {
            const clips = clipSource.animations || [];
            if (clips.length === 0) {
                animationState.hasBuiltInAnimations = false;
                return;
            }

            animationState.mixer = new THREE.AnimationMixer(clipSource);
            animationState.hasBuiltInAnimations = true;

            for (const clip of clips) {
                const name = clip.name.toLowerCase();
                const action = animationState.mixer.clipAction(clip);
                if (!animationState.actions.idle && (name.includes('idle') || name.includes('stand'))) {
                    animationState.actions.idle = action;
                }
                if (!animationState.actions.walk && (name.includes('walk') || name.includes('run') || name.includes('move'))) {
                    animationState.actions.walk = action;
                }
            }

            // 如果素材命名不规范，至少保证能播放一个动作
            const fallbackAction = animationState.mixer.clipAction(clips[0]);
            if (!animationState.actions.idle) animationState.actions.idle = fallbackAction;
            if (!animationState.actions.walk) animationState.actions.walk = fallbackAction;
        }

        function setPlayerAction(nextAction) {
            if (!nextAction || animationState.currentAction === nextAction) return;
            if (animationState.currentAction) {
                animationState.currentAction.fadeOut(0.2);
            }
            nextAction.reset().fadeIn(0.2).play();
            animationState.currentAction = nextAction;
        }

        function updateProceduralAnimation(delta, isMoving) {
            if (!animationState.visualRoot) return;
            animationState.proceduralTime += delta * (isMoving ? 9 : 3);
            const t = animationState.proceduralTime;

            const bob = isMoving ? Math.abs(Math.sin(t)) * 0.08 : Math.sin(t) * 0.015;
            animationState.visualRoot.position.y = animationState.baseVisualY + bob;
            animationState.visualRoot.rotation.z = isMoving ? Math.sin(t * 1.2) * 0.06 : 0;
            animationState.visualRoot.rotation.x = isMoving ? Math.sin(t * 2.0) * 0.03 : 0;
        }

        function applyTrimMaterialClipping(root, trimState = modelTrim) {
            root.traverse((child) => {
                if (!child.isMesh) return;
                const mats = Array.isArray(child.material) ? child.material : [child.material];
                mats.forEach((mat) => {
                    if (!mat) return;
                    mat.clippingPlanes = [trimState.clipPlane];
                    mat.clipShadows = true;
                    mat.needsUpdate = true;
                });
            });
        }

        function createTrimState(bottomClip = 0.08) {
            return {
                enabled: true,
                bottomClip,
                clipPlane: new THREE.Plane(new THREE.Vector3(0, 1, 0), 0),
                clipTarget: null,
                localClipHeight: 0,
                tmpQuat: new THREE.Quaternion(),
                tmpNormal: new THREE.Vector3(),
                tmpPoint: new THREE.Vector3()
            };
        }

        function calibrateModelTrim(target, trimState = modelTrim, anchorPos = gameState.playerPos) {
            if (!trimState.enabled || !target) return;
            const referenceWorld = new THREE.Vector3(
                anchorPos.x,
                anchorPos.y + trimState.bottomClip,
                anchorPos.z
            );
            target.updateMatrixWorld(true);
            const referenceLocal = target.worldToLocal(referenceWorld.clone());
            trimState.clipTarget = target;
            trimState.localClipHeight = referenceLocal.y;
        }

        function updateTrimPlane(trimState, fallbackTarget) {
            if (!trimState.enabled) return;
            const clipTarget = trimState.clipTarget || fallbackTarget;
            if (!clipTarget) return;

            const normal = trimState.tmpNormal
                .set(0, 1, 0)
                .applyQuaternion(clipTarget.getWorldQuaternion(trimState.tmpQuat))
                .normalize();
            const point = clipTarget.localToWorld(
                trimState.tmpPoint.set(0, trimState.localClipHeight, 0)
            );
            trimState.clipPlane.setFromNormalAndCoplanarPoint(normal, point);
        }

        function tintRobotRed(root) {
            root.traverse((child) => {
                if (!child.isMesh || !child.material) return;
                const mats = Array.isArray(child.material) ? child.material : [child.material];
                const tinted = mats.map((mat) => {
                    const cloned = mat.clone();
                    if (cloned.color) cloned.color.setHex(0x8b1f1f);
                    if (cloned.map) cloned.map = null;
                    if (cloned.emissive) {
                        cloned.emissive.setHex(0x220000);
                        cloned.emissiveIntensity = 0.2;
                    }
                    if ('roughness' in cloned) cloned.roughness = 0.45;
                    if ('metalness' in cloned) cloned.metalness = 0.18;
                    cloned.userData.enemyBaseColor = 0x8b1f1f;
                    cloned.userData.enemyBaseEmissive = 0x220000;
                    cloned.userData.enemyBaseEmissiveIntensity = 0.2;
                    cloned.userData.enemyHitColor = 0xff2d2d;
                    cloned.userData.enemyHitEmissive = 0xff2222;
                    cloned.userData.enemyHitEmissiveIntensity = 0.5;
                    return cloned;
                });
                child.material = Array.isArray(child.material) ? tinted : tinted[0];
            });
        }

        function setEnemyFlashVisual(enemy, flashing) {
            if (!enemy || !enemy.root) return;
            enemy.root.traverse((child) => {
                if (!child.isMesh || !child.material) return;
                const mats = Array.isArray(child.material) ? child.material : [child.material];
                mats.forEach((mat) => {
                    const data = mat.userData || {};
                    if (mat.color) {
                        mat.color.setHex(flashing ? (data.enemyHitColor || 0xff2d2d) : (data.enemyBaseColor || 0x8b1f1f));
                    }
                    if (mat.emissive) {
                        mat.emissive.setHex(flashing ? (data.enemyHitEmissive || 0xff2222) : (data.enemyBaseEmissive || 0x220000));
                        mat.emissiveIntensity = flashing
                            ? (data.enemyHitEmissiveIntensity ?? 0.5)
                            : (data.enemyBaseEmissiveIntensity ?? 0.2);
                    }
                });
            });
            enemy.isFlashing = flashing;
        }

        function createEnemyHealthBar(enemy) {
            const targetRoot = enemy.root;
            const barGroup = new THREE.Group();
            barGroup.position.set(0, 2.55, 0);

            const bg = new THREE.Mesh(
                new THREE.PlaneGeometry(1.22, 0.17),
                new THREE.MeshBasicMaterial({ color: 0x111111, transparent: true, opacity: 0.9 })
            );
            barGroup.add(bg);

            const fill = new THREE.Mesh(
                new THREE.PlaneGeometry(1.16, 0.11),
                new THREE.MeshBasicMaterial({ color: 0x66ff66 })
            );
            fill.position.z = 0.001;
            barGroup.add(fill);

            targetRoot.add(barGroup);
            enemy.healthBar = barGroup;
            enemy.healthFill = fill;
            updateEnemyHealthBar(enemy);
        }

        function updateEnemyHealthBar(enemy) {
            if (!enemy || !enemy.healthFill) return;
            const ratio = clamp(enemy.hp / enemy.maxHp, 0, 1);
            enemy.healthFill.scale.x = ratio;
            enemy.healthFill.position.x = -0.58 * (1 - ratio);
            if (ratio > 0.6) {
                enemy.healthFill.material.color.setHex(0x66ff66);
            } else if (ratio > 0.3) {
                enemy.healthFill.material.color.setHex(0xffcc33);
            } else {
                enemy.healthFill.material.color.setHex(0xff4444);
            }
        }

        function updatePlayerHealthUI() {
            const hpText = document.getElementById('playerHp');
            if (!hpText) return;
            hpText.textContent = `主角生命: ${playerState.hp} / ${playerState.maxHp}`;
            if (playerState.hp > 60) {
                hpText.style.color = '#ffffff';
            } else if (playerState.hp > 30) {
                hpText.style.color = '#ffd24d';
            } else {
                hpText.style.color = '#ff6a6a';
            }
        }

        function updateBuffUI() {
            const buffText = document.getElementById('buffStatus');
            if (!buffText) return;
            buffText.textContent = `攻速倍率: x${playerState.attackSpeedMultiplier.toFixed(2)}`;
            buffText.style.color = playerState.attackSpeedMultiplier > 1 ? '#7dff8a' : '#ffffff';
        }

        function setGameOver() {
            if (gameState.isGameOver) return;
            gameState.isGameOver = true;
            gameState.keys = {};
            const overlay = document.getElementById('gameOverOverlay');
            if (overlay) overlay.style.display = 'flex';
        }

        function spawnAttackSpeedBuff(position, dropType = 'generic') {
            const buffGeometry = new THREE.OctahedronGeometry(0.35, 0);
            const buffMaterial = new THREE.MeshStandardMaterial({
                color: 0x66ffcc,
                emissive: 0x33cc99,
                emissiveIntensity: 0.55,
                roughness: 0.35,
                metalness: 0.45
            });
            const buff = new THREE.Mesh(buffGeometry, buffMaterial);
            buff.castShadow = true;
            buff.position.copy(position);
            buff.position.y += 1.2;
            scene.add(buff);

            buffState.drops.push({ mesh: buff, type: dropType });
        }

        function updateBuff(delta) {
            if (buffState.drops.length === 0 || !player) return;
            buffState.bobTime += delta;
            const bobOffset = Math.sin(buffState.bobTime * 3.5) * 0.0025;

            for (let i = buffState.drops.length - 1; i >= 0; i--) {
                const drop = buffState.drops[i];
                const mesh = drop.mesh;
                mesh.rotation.y += delta * 1.8;
                mesh.position.y += bobOffset;

                const pickupDist = player.position.distanceTo(mesh.position);
                if (pickupDist < 1.1) {
                    scene.remove(mesh);
                    buffState.drops.splice(i, 1);
                    playerState.attackSpeedMultiplier *= 1.1;
                    updateBuffUI();
                    if (drop.type === 'wave1' && levelState.current === 1) {
                        spawnLevelTwoEnemies();
                    } else if (drop.type === 'wave2') {
                        levelState.wave2BuffCollected += 1;
                        if (
                            levelState.wave2BuffCollected >= levelState.wave2BuffDropsTotal &&
                            !levelState.bossSpawned
                        ) {
                            spawnBossEnemy();
                        }
                    }
                }
            }
        }

        function removeRobotBaseMeshes(root) {
            const toRemove = [];
            root.traverse((child) => {
                if (!child.isMesh) return;

                const name = (child.name || '').toLowerCase();
                const geometry = child.geometry;
                if (!geometry) return;

                if (!geometry.boundingBox) geometry.computeBoundingBox();
                const box = geometry.boundingBox;
                if (!box) return;

                const size = new THREE.Vector3();
                box.getSize(size);
                const worldPos = child.getWorldPosition(new THREE.Vector3());

                const isDiskLike = size.y > 0 && (size.x > size.y * 3.5 || size.z > size.y * 3.5);
                const isNearGround = worldPos.y < 0.35;
                const byName = name.includes('base') || name.includes('plate') || name.includes('pedestal') || name.includes('ground');

                if ((isDiskLike && isNearGround) || byName) {
                    toRemove.push(child);
                }
            });

            toRemove.forEach((mesh) => {
                if (mesh.parent) mesh.parent.remove(mesh);
            });
        }

        // 创建玩家（优先加载机器人 FBX）
        async function createPlayer() {
            const loader = new FBXLoader();
            try {
                const robot = await loader.loadAsync('robot.fbx');
                const robotRoot = new THREE.Group();
                robotRoot.add(robot);

                // 先移除底座，再做尺寸归一和落地对齐，避免脚底悬空
                removeRobotBaseMeshes(robot);

                robot.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                const box = new THREE.Box3().setFromObject(robot);
                const size = box.getSize(new THREE.Vector3());
                if (size.y > 0) {
                    const scaleFactor = modelFit.targetHeight / size.y;
                    robot.scale.setScalar(scaleFactor);
                }

                const normalizedBox = new THREE.Box3().setFromObject(robot);
                const center = normalizedBox.getCenter(new THREE.Vector3());
                robot.position.set(
                    -center.x,
                    -normalizedBox.min.y - modelFit.footGroundOffset,
                    -center.z
                );

                robotRoot.position.copy(gameState.playerPos);
                scene.add(robotRoot);
                animationState.visualRoot = robot;
                animationState.baseVisualY = robot.position.y;
                if (modelTrim.enabled) {
                    applyTrimMaterialClipping(robot);
                    calibrateModelTrim(robot);
                }
                setupAnimationActions(robot);
                return robotRoot;
            } catch (error) {
                console.warn('robot.fbx 加载失败，使用默认角色:', error);
                return createFallbackPlayer();
            }
        }

        async function createEnemyAt(enemyX, enemyZ, options = {}) {
            const loader = new FBXLoader();
            try {
                const {
                    maxHp = enemyConfig.maxHp,
                    speed = enemyConfig.speed,
                    scaleMultiplier = 1,
                    dropType = 'generic'
                } = options;
                const robot = await loader.loadAsync('robot.fbx');
                const enemyRoot = new THREE.Group();
                enemyRoot.add(robot);

                removeRobotBaseMeshes(robot);
                tintRobotRed(robot);

                robot.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                const box = new THREE.Box3().setFromObject(robot);
                const size = box.getSize(new THREE.Vector3());
                if (size.y > 0) {
                    const scaleFactor = (modelFit.targetHeight * scaleMultiplier) / size.y;
                    robot.scale.setScalar(scaleFactor);
                }

                const normalizedBox = new THREE.Box3().setFromObject(robot);
                const center = normalizedBox.getCenter(new THREE.Vector3());
                robot.position.set(
                    -center.x,
                    -normalizedBox.min.y - modelFit.footGroundOffset,
                    -center.z
                );

                const enemyY = getGroundHeightAt(enemyX, enemyZ) + modelFit.footGroundOffset;
                enemyRoot.position.set(enemyX, enemyY, enemyZ);
                enemyRoot.rotation.y = Math.atan2(
                    gameState.playerPos.x - enemyX,
                    gameState.playerPos.z - enemyZ
                );
                scene.add(enemyRoot);
                const enemyTrim = createTrimState(0.08);
                applyTrimMaterialClipping(robot, enemyTrim);
                calibrateModelTrim(robot, enemyTrim, enemyRoot.position);

                const enemy = {
                    maxHp,
                    hp: maxHp,
                    speed,
                    root: enemyRoot,
                    healthBar: null,
                    healthFill: null,
                    alive: true,
                    flashTimer: 0,
                    flashDuration: enemyConfig.flashDuration,
                    isFlashing: false,
                    trimState: enemyTrim,
                    dropType
                };

                setEnemyFlashVisual(enemy, false);
                createEnemyHealthBar(enemy);
                enemies.push(enemy);
                return enemy;
            } catch (error) {
                console.warn('enemy robot.fbx 加载失败:', error);
                return null;
            }
        }

        async function spawnLevelOneEnemy() {
            const spawnDistance = 24;
            const playerYaw = player ? player.rotation.y : 0;
            const forward = new THREE.Vector3(
                Math.sin(playerYaw), 0, Math.cos(playerYaw)
            ).normalize();
            const enemyX = gameState.playerPos.x + forward.x * spawnDistance;
            const enemyZ = gameState.playerPos.z + forward.z * spawnDistance;
            await createEnemyAt(enemyX, enemyZ, { dropType: 'wave1' });
        }

        async function spawnLevelTwoEnemies() {
            if (levelState.wave2Spawned) return;
            levelState.wave2Spawned = true;
            levelState.current = 2;
            levelState.wave2BuffDropsTotal = 3;
            levelState.wave2BuffCollected = 0;

            const spawnDistance = 24;
            const spacing = 3.5;
            const playerYaw = player ? player.rotation.y : 0;
            const forward = new THREE.Vector3(
                Math.sin(playerYaw), 0, Math.cos(playerYaw)
            ).normalize();
            const right = new THREE.Vector3(forward.z, 0, -forward.x).normalize();
            const center = gameState.playerPos.clone().add(forward.multiplyScalar(spawnDistance));

            const offsets = [-spacing, 0, spacing];
            for (const offset of offsets) {
                const pos = center.clone().add(right.clone().multiplyScalar(offset));
                await createEnemyAt(pos.x, pos.z, { dropType: 'wave2' });
            }
        }

        async function spawnBossEnemy() {
            if (levelState.bossSpawned) return;
            levelState.bossSpawned = true;
            levelState.current = 3;

            const spawnDistance = 28;
            const playerYaw = player ? player.rotation.y : 0;
            const forward = new THREE.Vector3(
                Math.sin(playerYaw), 0, Math.cos(playerYaw)
            ).normalize();
            const enemyX = gameState.playerPos.x + forward.x * spawnDistance;
            const enemyZ = gameState.playerPos.z + forward.z * spawnDistance;

            await createEnemyAt(enemyX, enemyZ, {
                maxHp: 500,
                speed: enemyConfig.speed * 0.9,
                scaleMultiplier: 2.2,
                dropType: null
            });
        }

        // 初始化场景
        createGround();

        // 添加岩石
        for (let i = 0; i < 15; i++) {
            const x = (Math.random() - 0.5) * 25;
            const z = (Math.random() - 0.5) * 25;
            const scale = 0.8 + Math.random() * 0.8;
            createRock(x, z, scale);
        }

        // 添加晶体
        const crystals = [];
        for (let i = 0; i < 10; i++) {
            const x = (Math.random() - 0.5) * 20;
            const z = (Math.random() - 0.5) * 20;
            crystals.push(createCrystal(x, z));
        }

        let player = null;
        let enemies = [];

        function shootBullet() {
            if (!player || shootingState.cooldownLeft > 0) return;

            const bulletGeometry = new THREE.SphereGeometry(shootingState.radius, 10, 10);
            const bulletMaterial = new THREE.MeshStandardMaterial({
                color: 0xFFCC33,
                emissive: 0xFFAA00,
                emissiveIntensity: 0.9
            });
            const bullet = new THREE.Mesh(bulletGeometry, bulletMaterial);
            bullet.castShadow = true;

            const dir = new THREE.Vector3(
                Math.sin(player.rotation.y),
                0,
                Math.cos(player.rotation.y)
            ).normalize();
            const spawn = gameState.playerPos.clone().add(dir.clone().multiplyScalar(0.7));
            spawn.y += 1.0;
            bullet.position.copy(spawn);

            scene.add(bullet);
            shootingState.bullets.push({
                mesh: bullet,
                velocity: dir.multiplyScalar(shootingState.speed),
                life: shootingState.life,
                prevPos: spawn.clone()
            });
            shootingState.cooldownLeft = shootingState.cooldown / playerState.attackSpeedMultiplier;
        }

        function updateBullets(delta) {
            if (shootingState.cooldownLeft > 0) {
                shootingState.cooldownLeft = Math.max(0, shootingState.cooldownLeft - delta);
            }

            for (let i = shootingState.bullets.length - 1; i >= 0; i--) {
                const bullet = shootingState.bullets[i];
                bullet.life -= delta;
                bullet.prevPos.copy(bullet.mesh.position);
                bullet.mesh.position.addScaledVector(bullet.velocity, delta);

                let hitEnemy = false;
                for (let e = enemies.length - 1; e >= 0; e--) {
                    const enemy = enemies[e];
                    if (!enemy.alive || !enemy.root) continue;

                    // 用线段-球体检测，避免高速子弹穿透敌人
                    const start = bullet.prevPos;
                    const end = bullet.mesh.position;
                    const seg = new THREE.Vector3().subVectors(end, start);
                    const toEnemy = new THREE.Vector3().subVectors(enemy.root.position, start);
                    const segLenSq = Math.max(seg.lengthSq(), 1e-6);
                    const t = clamp(toEnemy.dot(seg) / segLenSq, 0, 1);
                    const closest = start.clone().addScaledVector(seg, t);
                    const hitDist = closest.distanceTo(enemy.root.position);

                    if (hitDist < 1.1) {
                        bullet.mesh.position.copy(closest);
                        enemy.hp = Math.max(0, enemy.hp - 10);
                        enemy.flashTimer = enemy.flashDuration;
                        setEnemyFlashVisual(enemy, true);
                        updateEnemyHealthBar(enemy);
                        hitEnemy = true;

                        if (enemy.hp <= 0) {
                            enemy.alive = false;
                            scene.remove(enemy.root);
                            enemies.splice(e, 1);
                            if (enemy.dropType) {
                                spawnAttackSpeedBuff(closest, enemy.dropType);
                            }
                        }
                        break;
                    }
                }

                const outOfBounds = Math.abs(bullet.mesh.position.x) > 40 || Math.abs(bullet.mesh.position.z) > 40;
                if (hitEnemy || bullet.life <= 0 || outOfBounds) {
                    scene.remove(bullet.mesh);
                    shootingState.bullets.splice(i, 1);
                }
            }
        }

        function updateEnemy(delta) {
            if (playerState.cooldownLeft > 0) {
                playerState.cooldownLeft = Math.max(0, playerState.cooldownLeft - delta);
            }
            let nearestDist = Infinity;
            for (const enemy of enemies) {
                if (!enemy.alive || !enemy.root) continue;

                if (enemy.flashTimer > 0) {
                    enemy.flashTimer = Math.max(0, enemy.flashTimer - delta);
                    if (enemy.flashTimer <= 0 && enemy.isFlashing) {
                        setEnemyFlashVisual(enemy, false);
                    }
                }

                const toPlayer = new THREE.Vector3(
                    gameState.playerPos.x - enemy.root.position.x,
                    0,
                    gameState.playerPos.z - enemy.root.position.z
                );
                const distance = toPlayer.length();
                nearestDist = Math.min(nearestDist, distance);

                if (distance > 1.6) {
                    toPlayer.normalize();
                    const step = enemy.speed * delta;
                    enemy.root.position.x += toPlayer.x * step;
                    enemy.root.position.z += toPlayer.z * step;

                    const targetYaw = Math.atan2(toPlayer.x, toPlayer.z);
                    enemy.root.rotation.y = THREE.MathUtils.lerp(enemy.root.rotation.y, targetYaw, 0.1);
                }

                enemy.root.position.y =
                    getGroundHeightAt(enemy.root.position.x, enemy.root.position.z) + modelFit.footGroundOffset;

                if (enemy.healthBar) {
                    enemy.healthBar.lookAt(camera.position);
                }
            }

            if (nearestDist <= 1.6 && playerState.cooldownLeft <= 0 && playerState.hp > 0) {
                playerState.hp = Math.max(0, playerState.hp - playerState.touchDamage);
                playerState.cooldownLeft = playerState.hitCooldown;
                updatePlayerHealthUI();
                if (playerState.hp <= 0) {
                    setGameOver();
                }
            }
        }

        // 鼠标拖拽相机
        canvas.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            cameraState.isDragging = true;
            cameraState.lastX = e.clientX;
            cameraState.lastY = e.clientY;
        });

        window.addEventListener('mouseup', () => {
            cameraState.isDragging = false;
        });

        window.addEventListener('mousemove', (e) => {
            if (!cameraState.isDragging) return;
            const dx = e.clientX - cameraState.lastX;
            const dy = e.clientY - cameraState.lastY;
            cameraState.lastX = e.clientX;
            cameraState.lastY = e.clientY;

            cameraState.yaw -= dx * cameraState.rotateSensitivity;
            cameraState.pitch -= dy * cameraState.rotateSensitivity;
            cameraState.pitch = clamp(cameraState.pitch, -0.35, 1.2);
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            cameraState.distance += e.deltaY * 0.01;
            cameraState.distance = clamp(cameraState.distance, cameraState.minDistance, cameraState.maxDistance);
        }, { passive: false });

        // 键盘事件
        window.addEventListener('keydown', (e) => {
            if (gameState.isGameOver) return;
            gameState.keys[e.key.toLowerCase()] = true;
            if (e.key === ' ' && !gameState.isJumping) {
                gameState.playerVelocity.y = physics.jumpVelocity;
                gameState.isJumping = true;
            }
            if (e.key.toLowerCase() === 'j') {
                shootBullet();
            }
        });

        window.addEventListener('keyup', (e) => {
            gameState.keys[e.key.toLowerCase()] = false;
        });

        // 更新玩家位置
        function updatePlayer(delta) {
            const speed = 5 * delta;
            const moveDir = new THREE.Vector3();

            // 以相机朝向为基准的移动方向，W 永远是"前进"
            const camForward = new THREE.Vector3(
                -Math.sin(cameraState.yaw), 0, -Math.cos(cameraState.yaw)
            );
            const camRight = new THREE.Vector3(
                Math.cos(cameraState.yaw), 0, -Math.sin(cameraState.yaw)
            );

            if (gameState.keys['w']) moveDir.add(camForward);
            if (gameState.keys['s']) moveDir.sub(camForward);
            if (gameState.keys['a']) moveDir.sub(camRight);
            if (gameState.keys['d']) moveDir.add(camRight);

            if (moveDir.length() > 0) {
                moveDir.normalize();
                gameState.playerPos.x += moveDir.x * speed;
                gameState.playerPos.z += moveDir.z * speed;
            }
            const isMoving = moveDir.lengthSq() > 0;

            // 按时间步进的跳跃重力，增加滞空感并避免“瞬间掉落”
            const baseGravity = gameState.playerVelocity.y > 0 ? physics.gravity : physics.fallGravity;
            const nearApex = Math.abs(gameState.playerVelocity.y) < physics.apexHangVelocity;
            const gravityScale = nearApex ? physics.apexGravityScale : 1;
            gameState.playerVelocity.y -= baseGravity * gravityScale * delta;
            gameState.playerVelocity.y = Math.max(gameState.playerVelocity.y, -physics.maxFallSpeed);
            gameState.playerPos.y += gameState.playerVelocity.y * delta;

            // 地形碰撞：基于当前 x/z 实时贴合地面高度
            const terrainGroundY = getGroundHeightAt(gameState.playerPos.x, gameState.playerPos.z) + modelFit.footGroundOffset;
            if (gameState.playerPos.y <= terrainGroundY) {
                gameState.playerPos.y = terrainGroundY;
                gameState.playerVelocity.y = 0;
                gameState.isJumping = false;
            }

            // 边界限制
            const halfWorldSize = (worldConfig.tileSize * worldConfig.tileCountPerAxis) / 2;
            const movementLimit = halfWorldSize - worldConfig.borderPadding;
            gameState.playerPos.x = Math.max(-movementLimit, Math.min(movementLimit, gameState.playerPos.x));
            gameState.playerPos.z = Math.max(-movementLimit, Math.min(movementLimit, gameState.playerPos.z));

            if (player) {
                player.position.copy(gameState.playerPos);
            } else {
                return;
            }

            updateTrimPlane(modelTrim, animationState.visualRoot || player);

            if (isMoving) {
                const targetYaw = Math.atan2(moveDir.x, moveDir.z);
                player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, targetYaw, 0.2);
            }

            if (animationState.hasBuiltInAnimations && animationState.mixer) {
                const nextAction = isMoving ? animationState.actions.walk : animationState.actions.idle;
                setPlayerAction(nextAction);
                animationState.mixer.update(delta);
            } else {
                updateProceduralAnimation(delta, isMoving);
            }

            // 检测晶体收集
            crystals.forEach((crystal, index) => {
                if (!crystal.userData.collected) {
                    const dist = player.position.distanceTo(crystal.position);
                    if (dist < 1) {
                        crystal.userData.collected = true;
                        scene.remove(crystal);
                        gameState.score++;
                        document.getElementById('score').textContent = `收集的晶体: ${gameState.score}`;
                    }
                }
            });

            // 第三人称相机跟随（由鼠标拖拽控制角度）
            const horizontal = Math.cos(cameraState.pitch) * cameraState.distance;
            const cameraOffset = new THREE.Vector3(
                Math.sin(cameraState.yaw) * horizontal,
                Math.sin(cameraState.pitch) * cameraState.distance + 2.2,
                Math.cos(cameraState.yaw) * horizontal
            );
            camera.position.copy(gameState.playerPos).add(cameraOffset);
            camera.lookAt(gameState.playerPos.x, gameState.playerPos.y + 1.2, gameState.playerPos.z);
        }

        // 动画循环
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            if (!gameState.isGameOver) {
                updatePlayer(delta);
                updateEnemy(delta);
                updateBullets(delta);
                updateBuff(delta);
                for (const enemy of enemies) {
                    if (enemy.alive && enemy.root) {
                        updateTrimPlane(enemy.trimState, enemy.root);
                    }
                }
            }

            // 晶体旋转动画
            crystals.forEach(crystal => {
                if (!crystal.userData.collected) {
                    crystal.rotation.y += delta * 2;
                    crystal.position.y = 0.5 + Math.sin(Date.now() * 0.003) * 0.1;
                }
            });

            renderer.render(scene, camera);
        }

        // 窗口调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 初始化玩家后开始游戏
        async function startGame() {
            const loadingEl = document.getElementById('loading');
            loadingEl.textContent = '加载机器人模型中...';
            gameState.isGameOver = false;
            const overlay = document.getElementById('gameOverOverlay');
            if (overlay) overlay.style.display = 'none';
            playerState.hp = playerState.maxHp;
            playerState.cooldownLeft = 0;
            playerState.attackSpeedMultiplier = 1;
            levelState.current = 1;
            levelState.wave2Spawned = false;
            levelState.wave2BuffDropsTotal = 0;
            levelState.wave2BuffCollected = 0;
            levelState.bossSpawned = false;
            enemies.forEach((enemy) => {
                if (enemy.root) scene.remove(enemy.root);
            });
            enemies = [];
            buffState.drops.forEach((drop) => scene.remove(drop.mesh));
            buffState.drops = [];
            buffState.bobTime = 0;
            updatePlayerHealthUI();
            updateBuffUI();
            player = await createPlayer();
            if (player) {
                player.rotation.y = 0;
            }
            await spawnLevelOneEnemy();
            loadingEl.style.display = 'none';
            animate();
        }

        function enableHotReload() {
            let lastVersion = null;
            const poll = async () => {
                try {
                    const res = await fetch(`/__hot_reload?t=${Date.now()}`, { cache: 'no-store' });
                    if (!res.ok) return;
                    const data = await res.json();
                    if (!data || typeof data.version !== 'number') return;
                    if (lastVersion === null) {
                        lastVersion = data.version;
                        return;
                    }
                    if (data.version !== lastVersion) {
                        location.reload();
                    }
                } catch (err) {
                    // 开发期允许短暂断连，不影响游戏运行
                }
            };

            poll();
            setInterval(poll, 1200);
        }

        const restartBtn = document.getElementById('restartBtn');
        if (restartBtn) {
            restartBtn.addEventListener('click', () => {
                window.location.reload();
            });
        }

        enableHotReload();
        startGame();
    </script>
</body>
</html>
