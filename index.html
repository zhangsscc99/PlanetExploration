<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>克罗斯星探险 - 3D游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: #000;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            background: rgba(0,0,0,0.6);
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 14px;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading">加载中...</div>
    <div id="ui">
        <div>克罗斯星探险</div>
        <div id="score">收集的晶体: 0</div>
    </div>
    <div id="controls">
        WASD 移动 | 鼠标拖拽旋转视角 | 空格跳跃
    </div>
    <canvas id="gameCanvas"></canvas>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

        // 游戏状态
        const gameState = {
            score: 0,
            playerPos: new THREE.Vector3(0, 1, 5),
            playerVelocity: new THREE.Vector3(0, 0, 0),
            isJumping: false,
            keys: {}
        };
        const animationState = {
            mixer: null,
            actions: { idle: null, walk: null },
            currentAction: null,
            hasBuiltInAnimations: false,
            visualRoot: null,
            baseVisualY: 0,
            proceduralTime: 0
        };
        const physics = {
            groundY: 1,
            jumpVelocity: 6.8,
            gravity: 18,
            fallGravity: 26,
            maxFallSpeed: 30,
            apexHangVelocity: 1.4,
            apexGravityScale: 0.45
        };

        // 场景设置
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

        // 相机
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);

        // 渲染器
        const canvas = document.getElementById('gameCanvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        // 控制器
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.2;

        // 光照
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        directionalLight.shadow.camera.left = -20;
        directionalLight.shadow.camera.right = 20;
        directionalLight.shadow.camera.top = 20;
        directionalLight.shadow.camera.bottom = -20;
        scene.add(directionalLight);

        // 创建地面（克罗斯星地面）
        function createGround() {
            const geometry = new THREE.PlaneGeometry(30, 30, 50, 50);

            // 添加高度变化
            const positions = geometry.attributes.position;
            for (let i = 0; i < positions.count; i++) {
                const x = positions.getX(i);
                const y = positions.getY(i);
                const noise = Math.sin(x * 0.3) * Math.cos(y * 0.3) * 0.3;
                positions.setZ(i, noise);
            }
            geometry.computeVertexNormals();

            const material = new THREE.MeshStandardMaterial({
                color: 0xF28A66,
                roughness: 0.8,
                metalness: 0.2
            });

            const ground = new THREE.Mesh(geometry, material);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
        }

        // 创建岩石
        function createRock(x, z, scale = 1) {
            const geometry = new THREE.DodecahedronGeometry(0.5 * scale, 0);
            const material = new THREE.MeshStandardMaterial({
                color: 0xB38050,
                roughness: 0.9,
                flatShading: true
            });

            const rock = new THREE.Mesh(geometry, material);
            rock.position.set(x, 0.3 * scale, z);
            rock.castShadow = true;
            rock.receiveShadow = true;
            scene.add(rock);
            return rock;
        }

        // 创建黄色晶体
        function createCrystal(x, z) {
            const geometry = new THREE.OctahedronGeometry(0.4, 0);
            const material = new THREE.MeshStandardMaterial({
                color: 0xFFD94D,
                roughness: 0.3,
                metalness: 0.5,
                emissive: 0xFFD94D,
                emissiveIntensity: 0.3,
                flatShading: true
            });

            const crystal = new THREE.Mesh(geometry, material);
            crystal.position.set(x, 0.5, z);
            crystal.castShadow = true;
            crystal.userData.isCrystal = true;
            scene.add(crystal);
            return crystal;
        }

        function createFallbackPlayer() {
            const geometry = new THREE.CapsuleGeometry(0.3, 0.8, 4, 8);
            const material = new THREE.MeshStandardMaterial({
                color: 0x4A90E2,
                roughness: 0.5
            });

            const fallback = new THREE.Mesh(geometry, material);
            fallback.position.copy(gameState.playerPos);
            fallback.castShadow = true;
            scene.add(fallback);
            animationState.visualRoot = fallback;
            animationState.baseVisualY = 0;
            return fallback;
        }

        function setupAnimationActions(clipSource) {
            const clips = clipSource.animations || [];
            if (clips.length === 0) {
                animationState.hasBuiltInAnimations = false;
                return;
            }

            animationState.mixer = new THREE.AnimationMixer(clipSource);
            animationState.hasBuiltInAnimations = true;

            for (const clip of clips) {
                const name = clip.name.toLowerCase();
                const action = animationState.mixer.clipAction(clip);
                if (!animationState.actions.idle && (name.includes('idle') || name.includes('stand'))) {
                    animationState.actions.idle = action;
                }
                if (!animationState.actions.walk && (name.includes('walk') || name.includes('run') || name.includes('move'))) {
                    animationState.actions.walk = action;
                }
            }

            // 如果素材命名不规范，至少保证能播放一个动作
            const fallbackAction = animationState.mixer.clipAction(clips[0]);
            if (!animationState.actions.idle) animationState.actions.idle = fallbackAction;
            if (!animationState.actions.walk) animationState.actions.walk = fallbackAction;
        }

        function setPlayerAction(nextAction) {
            if (!nextAction || animationState.currentAction === nextAction) return;
            if (animationState.currentAction) {
                animationState.currentAction.fadeOut(0.2);
            }
            nextAction.reset().fadeIn(0.2).play();
            animationState.currentAction = nextAction;
        }

        function updateProceduralAnimation(delta, isMoving) {
            if (!animationState.visualRoot) return;
            animationState.proceduralTime += delta * (isMoving ? 9 : 3);
            const t = animationState.proceduralTime;

            const bob = isMoving ? Math.abs(Math.sin(t)) * 0.08 : Math.sin(t) * 0.015;
            animationState.visualRoot.position.y = animationState.baseVisualY + bob;
            animationState.visualRoot.rotation.z = isMoving ? Math.sin(t * 1.2) * 0.06 : 0;
            animationState.visualRoot.rotation.x = isMoving ? Math.sin(t * 2.0) * 0.03 : 0;
        }

        // 创建玩家（优先加载机器人 FBX）
        async function createPlayer() {
            const loader = new FBXLoader();
            try {
                const robot = await loader.loadAsync('robot.fbx');
                const robotRoot = new THREE.Group();
                robotRoot.add(robot);

                robot.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                const box = new THREE.Box3().setFromObject(robot);
                const size = box.getSize(new THREE.Vector3());
                if (size.y > 0) {
                    const targetHeight = 1.8;
                    const scaleFactor = targetHeight / size.y;
                    robot.scale.setScalar(scaleFactor);
                }

                const normalizedBox = new THREE.Box3().setFromObject(robot);
                const center = normalizedBox.getCenter(new THREE.Vector3());
                robot.position.set(-center.x, -normalizedBox.min.y, -center.z);

                robotRoot.position.copy(gameState.playerPos);
                scene.add(robotRoot);
                animationState.visualRoot = robot;
                animationState.baseVisualY = robot.position.y;
                setupAnimationActions(robot);
                return robotRoot;
            } catch (error) {
                console.warn('robot.fbx 加载失败，使用默认角色:', error);
                return createFallbackPlayer();
            }
        }

        // 初始化场景
        createGround();

        // 添加岩石
        for (let i = 0; i < 15; i++) {
            const x = (Math.random() - 0.5) * 25;
            const z = (Math.random() - 0.5) * 25;
            const scale = 0.8 + Math.random() * 0.8;
            createRock(x, z, scale);
        }

        // 添加晶体
        const crystals = [];
        for (let i = 0; i < 10; i++) {
            const x = (Math.random() - 0.5) * 20;
            const z = (Math.random() - 0.5) * 20;
            crystals.push(createCrystal(x, z));
        }

        let player = null;

        // 键盘事件
        window.addEventListener('keydown', (e) => {
            gameState.keys[e.key.toLowerCase()] = true;
            if (e.key === ' ' && !gameState.isJumping) {
                gameState.playerVelocity.y = physics.jumpVelocity;
                gameState.isJumping = true;
            }
        });

        window.addEventListener('keyup', (e) => {
            gameState.keys[e.key.toLowerCase()] = false;
        });

        // 更新玩家位置
        function updatePlayer(delta) {
            const speed = 5 * delta;
            const moveDir = new THREE.Vector3();

            if (gameState.keys['w']) moveDir.z -= 1;
            if (gameState.keys['s']) moveDir.z += 1;
            if (gameState.keys['a']) moveDir.x -= 1;
            if (gameState.keys['d']) moveDir.x += 1;

            if (moveDir.length() > 0) {
                moveDir.normalize();
                gameState.playerPos.x += moveDir.x * speed;
                gameState.playerPos.z += moveDir.z * speed;
            }
            const isMoving = moveDir.lengthSq() > 0;

            // 按时间步进的跳跃重力，增加滞空感并避免“瞬间掉落”
            const baseGravity = gameState.playerVelocity.y > 0 ? physics.gravity : physics.fallGravity;
            const nearApex = Math.abs(gameState.playerVelocity.y) < physics.apexHangVelocity;
            const gravityScale = nearApex ? physics.apexGravityScale : 1;
            gameState.playerVelocity.y -= baseGravity * gravityScale * delta;
            gameState.playerVelocity.y = Math.max(gameState.playerVelocity.y, -physics.maxFallSpeed);
            gameState.playerPos.y += gameState.playerVelocity.y * delta;

            // 地面碰撞
            if (gameState.playerPos.y <= physics.groundY) {
                gameState.playerPos.y = physics.groundY;
                gameState.playerVelocity.y = 0;
                gameState.isJumping = false;
            }

            // 边界限制
            gameState.playerPos.x = Math.max(-12, Math.min(12, gameState.playerPos.x));
            gameState.playerPos.z = Math.max(-12, Math.min(12, gameState.playerPos.z));

            if (player) {
                player.position.copy(gameState.playerPos);
            } else {
                return;
            }

            if (isMoving) {
                const targetYaw = Math.atan2(moveDir.x, moveDir.z);
                player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, targetYaw, 0.2);
            }

            if (animationState.hasBuiltInAnimations && animationState.mixer) {
                const nextAction = isMoving ? animationState.actions.walk : animationState.actions.idle;
                setPlayerAction(nextAction);
                animationState.mixer.update(delta);
            } else {
                updateProceduralAnimation(delta, isMoving);
            }

            // 检测晶体收集
            crystals.forEach((crystal, index) => {
                if (!crystal.userData.collected) {
                    const dist = player.position.distanceTo(crystal.position);
                    if (dist < 1) {
                        crystal.userData.collected = true;
                        scene.remove(crystal);
                        gameState.score++;
                        document.getElementById('score').textContent = `收集的晶体: ${gameState.score}`;
                    }
                }
            });

            // 相机跟随
            camera.position.x = gameState.playerPos.x;
            camera.position.z = gameState.playerPos.z + 8;
            camera.position.y = gameState.playerPos.y + 5;
            controls.target.copy(gameState.playerPos);
        }

        // 动画循环
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            updatePlayer(delta);

            // 晶体旋转动画
            crystals.forEach(crystal => {
                if (!crystal.userData.collected) {
                    crystal.rotation.y += delta * 2;
                    crystal.position.y = 0.5 + Math.sin(Date.now() * 0.003) * 0.1;
                }
            });

            controls.update();
            renderer.render(scene, camera);
        }

        // 窗口调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 初始化玩家后开始游戏
        async function startGame() {
            const loadingEl = document.getElementById('loading');
            loadingEl.textContent = '加载机器人模型中...';
            player = await createPlayer();
            loadingEl.style.display = 'none';
            animate();
        }

        function enableHotReload() {
            let lastVersion = null;
            const poll = async () => {
                try {
                    const res = await fetch(`/__hot_reload?t=${Date.now()}`, { cache: 'no-store' });
                    if (!res.ok) return;
                    const data = await res.json();
                    if (!data || typeof data.version !== 'number') return;
                    if (lastVersion === null) {
                        lastVersion = data.version;
                        return;
                    }
                    if (data.version !== lastVersion) {
                        location.reload();
                    }
                } catch (err) {
                    // 开发期允许短暂断连，不影响游戏运行
                }
            };

            poll();
            setInterval(poll, 1200);
        }

        enableHotReload();
        startGame();
    </script>
</body>
</html>
